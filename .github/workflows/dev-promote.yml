name: Promote Dev to Main

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if dev is ahead of main
        id: check
        run: |
          COMMIT_COUNT=$(git rev-list origin/main..origin/dev --count)
          echo "count=$COMMIT_COUNT" >> "$GITHUB_OUTPUT"
          if [ "$COMMIT_COUNT" -eq 0 ]; then
            echo "dev is up to date with main — nothing to promote"
            exit 0
          fi

      - name: Generate commit summary
        if: steps.check.outputs.count != '0'
        id: summary
        run: |
          SUMMARY=$(git log origin/main..origin/dev --oneline)
          echo "commits<<EOF" >> "$GITHUB_OUTPUT"
          echo "$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create or update PR from dev to main
        if: steps.check.outputs.count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING_PR=$(gh pr list --base main --head dev --state open --json number --jq '.[0].number // empty')
          BODY="## Commits included

          ${{ steps.summary.outputs.commits }}

          ---
          *Auto-generated by dev-promote workflow*"

          if [ -n "$EXISTING_PR" ]; then
            gh pr edit "$EXISTING_PR" --body "$BODY"
            echo "Updated existing PR #$EXISTING_PR"
          else
            gh pr create \
              --base main \
              --head dev \
              --title "Promote dev to main" \
              --body "$BODY"
          fi
